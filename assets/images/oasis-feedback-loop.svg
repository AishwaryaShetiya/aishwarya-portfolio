<svg viewBox="0 0 920 460" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', sans-serif" role="img" aria-label="The Oasis feedback loop: the AI suggests a grouping, the user corrects it, telemetry captures the override as a signal, and the product improves — then repeats.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(245,245,245,.55)"/>
    </marker>
    <marker id="arrowYellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f5d016"/>
    </marker>
  </defs>

  <!-- background (made transparent so the SVG adapts to page background) -->
  <rect x="0" y="0" width="920" height="460" fill="none"/>

  <!-- title -->
  <text x="60" y="56" fill="#f5d016" font-size="13" font-weight="700" letter-spacing="3">THE FEEDBACK LOOP I BUILT</text>
  <text x="60" y="80" fill="rgba(245,245,245,.45)" font-size="13.5" font-weight="400">Every user correction became a signal that made the product smarter.</text>

  <!-- ───────── NODE 1: AI SUGGESTS ───────── -->
  <g>
    <rect x="60" y="150" width="180" height="120" rx="8" fill="none" stroke="#1a3fc7" stroke-width="2"/>
    <rect x="60" y="150" width="6" height="120" rx="3" fill="#1a3fc7"/>
    <text x="84" y="186" fill="#1a3fc7" font-size="11" font-weight="700" letter-spacing="2.5">STEP 01</text>
    <text x="84" y="216" fill="#f5f5f5" font-size="19" font-weight="700">The AI</text>
    <text x="84" y="240" fill="#f5f5f5" font-size="19" font-weight="700">suggests</text>
    <text x="84" y="261" fill="rgba(245,245,245,.5)" font-size="12">Groups tabs by context</text>
  </g>

  <!-- arrow 1 -> 2 -->
  <line x1="248" y1="210" x2="328" y2="210" stroke="rgba(245,245,245,.55)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ───────── NODE 2: USER CORRECTS ───────── -->
  <g>
    <rect x="335" y="150" width="180" height="120" rx="8" fill="none" stroke="#e2211c" stroke-width="2"/>
    <rect x="335" y="150" width="6" height="120" rx="3" fill="#e2211c"/>
    <text x="359" y="186" fill="#e2211c" font-size="11" font-weight="700" letter-spacing="2.5">STEP 02</text>
    <text x="359" y="216" fill="#f5f5f5" font-size="19" font-weight="700">The user</text>
    <text x="359" y="240" fill="#f5f5f5" font-size="19" font-weight="700">corrects</text>
    <text x="359" y="261" fill="rgba(245,245,245,.5)" font-size="12">Overrides the grouping</text>
  </g>

  <!-- arrow 2 -> 3 -->
  <line x1="523" y1="210" x2="603" y2="210" stroke="rgba(245,245,245,.55)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ───────── NODE 3: TELEMETRY CAPTURES ───────── -->
  <g>
    <rect x="610" y="150" width="180" height="120" rx="8" fill="none" stroke="#1fb141" stroke-width="2"/>
    <rect x="610" y="150" width="6" height="120" rx="3" fill="#1fb141"/>
    <text x="634" y="186" fill="#1fb141" font-size="11" font-weight="700" letter-spacing="2.5">STEP 03</text>
    <text x="634" y="216" fill="#f5f5f5" font-size="19" font-weight="700">Telemetry</text>
    <text x="634" y="240" fill="#f5f5f5" font-size="19" font-weight="700">captures</text>
    <text x="634" y="261" fill="rgba(245,245,245,.5)" font-size="12">Override logged as signal</text>
  </g>

  <!-- ───────── NODE 4: PRODUCT IMPROVES (center-bottom) ───────── -->
  <g>
    <rect x="320" y="340" width="280" height="86" rx="8" fill="#f5d016"/>
    <text x="344" y="372" fill="rgba(0,0,0,.55)" font-size="11" font-weight="700" letter-spacing="2.5">STEP 04</text>
    <text x="344" y="398" fill="#111111" font-size="18" font-weight="700">The product gets smarter</text>
    <text x="344" y="416" fill="rgba(0,0,0,.6)" font-size="11.5">Better suggestions next time</text>
  </g>

  <!-- arrow 3 -> 4 (down and around) -->
  <path d="M700,272 L700,383 L607,383" fill="none" stroke="rgba(245,245,245,.55)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- arrow 4 -> 1 (loop back, yellow = the insight) -->
  <path d="M320,383 L150,383 L150,272" fill="none" stroke="#f5d016" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round" marker-end="url(#arrowYellow)"/>
  <text x="168" y="356" fill="#f5d016" font-size="11" font-weight="700" letter-spacing="2">LOOP REPEATS</text>
</svg>
