<svg viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
/* ── GRASS SWAY ── */
.blade { transform-box:fill-box; transform-origin:bottom center; }
.b1 { animation:sw 3.1s ease-in-out infinite; }
.b2 { animation:sw 3.8s ease-in-out infinite .55s; }
.b3 { animation:sw 2.7s ease-in-out infinite 1.1s; }
.b4 { animation:sw 3.4s ease-in-out infinite 1.7s; }
.b5 { animation:sw 2.9s ease-in-out infinite .3s; }
.b6 { animation:sw 3.6s ease-in-out infinite .9s; }
@keyframes sw { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(6deg)} }

/* ── PAGE FLIP ── */
.pg {
  transform-box:fill-box;
  transform-origin:left center;
  animation:fp 5s ease-in-out infinite;
}
@keyframes fp {
  0%,38%  { transform:scaleX(1); }
  47%     { transform:scaleX(0); }
  56%     { transform:scaleX(-1); }
  78%     { transform:scaleX(-1); }
  87%     { transform:scaleX(0); }
  96%,100%{ transform:scaleX(1); }
}

/* ── FALLING LEAF ── */
.lf { animation:lfDrop 7.5s ease-in-out infinite 1.8s; }
@keyframes lfDrop {
  0%   { transform:translate(0,0) rotate(0deg); opacity:1; }
  85%  { opacity:.8; }
  100% { transform:translate(62px,195px) rotate(215deg); opacity:0; }
}

/* ── BUTTERFLY PATH ── */
.bf { animation:bfPath 10s ease-in-out infinite; }
@keyframes bfPath {
  0%,100%{ transform:translate(0px,0px); }
  25%    { transform:translate(32px,-26px); }
  50%    { transform:translate(58px,-8px); }
  75%    { transform:translate(28px,-32px); }
}
/* Wing flap */
.wl { transform-box:fill-box; transform-origin:right center; animation:wlf .3s ease-in-out infinite alternate; }
.wr { transform-box:fill-box; transform-origin:left center;  animation:wrf .3s ease-in-out infinite alternate; }
@keyframes wlf { to { transform:scaleX(0.1); } }
@keyframes wrf { to { transform:scaleX(0.1); } }

/* ── READER BOB ── */
.rd { animation:rdb 4.8s ease-in-out infinite; }
@keyframes rdb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

/* ── SUN PULSE ── */
.sg { animation:sp 4s ease-in-out infinite; }
@keyframes sp { 0%,100%{opacity:.18} 50%{opacity:.42} }

/* ── HAIR WISP ── */
.hs { transform-box:fill-box; transform-origin:top center; animation:hsw 5.5s ease-in-out infinite; }
@keyframes hsw { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(2deg)} }
</style>
</defs>

<!-- ══ SKY (matches blue tile) ══ -->
<rect width="500" height="580" fill="#1a3fc7"/>

<!-- Sun glow -->
<circle cx="418" cy="72" r="72" fill="#F5D016" opacity="0.18" class="sg"/>
<circle cx="418" cy="72" r="42" fill="#F5D016" opacity="0.93"/>
<circle cx="418" cy="72" r="54" fill="none" stroke="#F5D016" stroke-width="2.5" opacity="0.25"/>

